<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему - Мой Магазин</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .card.shadow {
            background: #ffffff;
            box-shadow: 0 0.5rem 1.5rem rgba(0, 0, 0, 0.1) !important;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5">
        <div class="container">
            <a class="navbar-brand" href="{% url 'catalog:main' %}">
                <i class="bi bi-laptop me-2"></i> ОЧЕНЬ КРУТОЙ МАГАЗИН АРТЁМА
            </a>
            <a href="{% url 'catalog:main' %}" class="btn btn-outline-light btn-sm">
                <i class="bi bi-house-door-fill"></i> На главную
            </a>
        </div>
    </nav>

    <div class="container my-auto">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow border-0 rounded-4">
                    <div class="card-body p-5">
                        
                        <div class="text-center mb-4">
                            <div class="display-4 text-primary mb-2">
                                <i class="bi bi-shield-lock-fill"></i>
                            </div>
                            <h2 class="fw-bold text-dark">Авторизация</h2>
                            <p class="text-muted small">Добро пожаловать! Войте в свой аккаунт</p>
                        </div>

                        {% if form.errors %}
                            <div class="alert alert-danger alert-dismissible fade show rounded-3 small" role="alert">
                                <i class="bi bi-exclamation-triangle-fill me-2"></i> Неверный логин или пароль.
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>
                        {% endif %}

                        <form method="post" novalidate>
                            {% csrf_token %}
                            
                            {% for field in form %}
                                <div class="mb-3">
                                    <label for="{{ field.id_for_label }}" class="form-label fw-semibold small text-secondary">
                                        {{ field.label }}
                                    </label>
                                    <input type="{{ field.field.widget.input_type|default:'text' }}" 
                                           name="{{ field.html_name }}" 
                                           id="{{ field.id_for_label }}" 
                                           class="form-control form-control-lg rounded-3 fs-6 {% if form.errors %}is-invalid{% endif %}" 
                                           placeholder="Введите {{ field.label|lower }}"
                                           required>
                                </div>
                            {% endfor %}

                            <button type="submit" class="btn btn-primary btn-lg w-100 rounded-3 mt-4 shadow-sm">
                                <i class="bi bi-box-arrow-in-right me-2"></i> Войти в аккаунт
                            </button>
                        </form>

                        <div class="text-center mt-4">
                            <p class="mb-0 text-muted small">Ещё нет аккаунта? 
                                <a href="{% url 'catalog:register' %}" class="text-primary fw-bold text-decoration-none">Зарегистрироваться</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white-50 text-center py-3 mt-5">
        <div class="container small">
            &copy; 2026 Мой Магазин. Все права защищены.
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
