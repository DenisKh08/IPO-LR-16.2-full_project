<h1>{{ product.name }}</h1>

{% if product.image %}
    <img src="{{ product.image.url }}" alt="{{ product.name }}" style="max-width: 300px;">
{% endif %}

<p><strong>Производитель:</strong> {{ product.manufacturer.name }}</p>
<p><strong>Категория:</strong> {{ product.category.name }}</p>
<p><strong>Описание:</strong> {{ product.description }}</p>
<p><strong>Цена:</strong> {{ product.price }} руб.</p>
<p><strong>В наличии:</strong> {{ product.stock }} шт.</p>

<hr>
<a href="{% url 'catalog:add_to_cart' product.id %}" style="padding: 10px; background: green; color: white; text-decoration: none;">
    Добавить в корзину
</a>
<br><br>
<a href="{% url 'catalog:product_list' %}"> Вернуться в каталог</a>
